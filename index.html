<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fac futurum</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: url('background.jpeg') no-repeat center center/cover;
        color: white;
        text-align: center;
        overflow: hidden;
    }

    .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.55);
        z-index: 0;
    }

    h1 {
        position: relative;
        font-size: 3rem;
        letter-spacing: 4px;
        margin-bottom: 40px;
        z-index: 1;
    }

    .timer-container {
        position: relative;
        width: 220px;
        height: 220px;
        z-index: 1;
    }

    svg {
        transform: rotate(-90deg);
    }

    circle {
        fill: none;
        stroke-width: 10;
        stroke-linecap: round;
    }

    .bg-circle {
        stroke: rgba(255,255,255,0.2);
    }

    .progress {
        stroke: white;
        stroke-dasharray: 628;
        stroke-dashoffset: 0;
        transition: stroke-dashoffset 1s linear;
    }

    .time {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 2rem;
        font-weight: bold;
    }

    .starting-text {
        margin-top: 20px;
        font-size: 1rem;
        opacity: 0.8;
    }
</style>
</head>
<body>

<div class="overlay"></div>

<h1>fac futurum</h1>

<div class="timer-container">
    <svg width="220" height="220">
        <circle class="bg-circle" cx="110" cy="110" r="100"></circle>
        <circle class="progress" cx="110" cy="110" r="100"></circle>
    </svg>
    <div class="time" id="time">37:00</div>
</div>

<div class="starting-text" id="startText">Starting in 20 seconds...</div>

<script>
    const FULL_TIME = 37 * 60; // 37 minutes in seconds
    const START_DELAY = 20; // 20 second delay
    const circle = document.querySelector('.progress');
    const timeDisplay = document.getElementById('time');
    const startText = document.getElementById('startText');

    const circumference = 2 * Math.PI * 100;
    circle.style.strokeDasharray = circumference;

    let countdownInterval;

    function startCountdown() {
        let remaining = FULL_TIME;
        startText.style.display = "none";

        countdownInterval = setInterval(() => {
            const minutes = Math.floor(remaining / 60);
            const seconds = remaining % 60;
            timeDisplay.textContent = 
                `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;

            const progress = remaining / FULL_TIME;
            circle.style.strokeDashoffset = circumference * (1 - progress);

            remaining--;

            if (remaining < 0) {
                clearInterval(countdownInterval);
            }
        }, 1000);
    }

    // 20 second delay before starting
    let delay = START_DELAY;
    const delayInterval = setInterval(() => {
        startText.textContent = `Starting in ${delay} seconds...`;
        delay--;

        if (delay < 0) {
            clearInterval(delayInterval);
            startCountdown();
        }
    }, 1000);
</script>

</body>
</html>
